databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory_user

services:
  - type: web
    name: inventory-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Inventory Order Management API
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: LOW_STOCK_THRESHOLD
        value: 10
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
