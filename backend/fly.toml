app = "inventory-management-dashboard-api"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  DEBUG = "false"
  LOW_STOCK_THRESHOLD = "10"
  PORT = "8000"
  SEED_DATABASE = "true"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
